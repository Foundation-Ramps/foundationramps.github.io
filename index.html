<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foundation Ramps — Custom Built Skateboard Ramps</title>
  <meta name="description" content="Custom-built skateboard ramps, rails, and obstacles. From backyard setups to full skatepark builds. Foundation Ramps — built to shred." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&family=Permanent+Marker&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: #0a0a0a; color: #f5f2ec; font-family: 'DM Sans', sans-serif; font-weight: 300; overflow-x: hidden; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #ff5c00; border-radius: 4px; }

    :root {
      --black: #0a0a0a;
      --white: #f5f2ec;
      --orange: #ff5c00;
      --orange-dim: #cc4900;
      --gray: #888;
    }

    /* NAV */
    .nav-link {
      color: rgba(255,255,255,0.5); text-decoration: none; font-size: 10px; letter-spacing: 3px;
      text-transform: uppercase; cursor: pointer; transition: color 0.3s;
      padding: 8px 0; font-family: 'DM Sans', sans-serif; font-weight: 500;
    }
    .nav-link:hover, .nav-link.active { color: var(--orange); }

    .section-label {
      font-family: 'Space Mono', monospace; font-size: 10px; color: var(--orange);
      letter-spacing: 4px; text-transform: uppercase; margin-bottom: 12px; display: inline-block;
    }
    .section-title {
      font-family: 'Bebas Neue', sans-serif; font-size: clamp(42px, 6vw, 88px);
      line-height: 0.9; letter-spacing: 2px;
    }
    .section-title em { font-style: normal; color: var(--orange); }

    .blueprint-grid {
      background-image:
        linear-gradient(rgba(255,92,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,92,0,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .card-hover { transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.4s; }
    .card-hover:hover { transform: translateY(-6px); box-shadow: 0 20px 60px rgba(255,92,0,0.12); }

    .glow-btn {
      background: var(--black); color: var(--white); border: none; padding: 14px 32px;
      font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 12px;
      letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
      position: relative; overflow: hidden; transition: all 0.3s;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .glow-btn:hover { background: var(--orange); }
    .glow-btn-outline {
      background: transparent; border: 1px solid rgba(255,92,0,0.4); color: var(--orange);
      padding: 14px 32px; font-family: 'DM Sans', sans-serif; font-weight: 500;
      font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer; transition: all 0.3s;
    }
    .glow-btn-outline:hover { background: rgba(255,92,0,0.1); border-color: var(--orange); }

    /* RAMP IMAGE CARDS */
    .ramp-img-card {
      background: #111; position: relative; overflow: hidden; cursor: pointer;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .ramp-img-card:hover { background: #1a1a1a; }
    .ramp-img-card:hover .ramp-card-num { color: var(--orange); }
    .ramp-img-card:hover .ramp-card-arrow { color: var(--orange); transform: translate(3px,-3px); }
    .ramp-img-card:hover .ramp-img-wrap img { transform: scale(1.05); }

    .ramp-img-wrap {
      width: 100%; aspect-ratio: 4/3; overflow: hidden; position: relative;
      background: #0d0d0d; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .ramp-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .ramp-card-info { padding: 20px 22px 28px; position: relative; }
    .ramp-card-num {
      font-family: 'Space Mono', monospace; font-size: 10px;
      color: rgba(255,255,255,0.25); letter-spacing: 2px; margin-bottom: 6px;
      transition: color 0.3s;
    }
    .ramp-card-name {
      font-family: 'Bebas Neue', sans-serif; font-size: 28px;
      letter-spacing: 2px; color: var(--white); margin-bottom: 6px;
    }
    .ramp-card-desc { font-size: 12px; line-height: 1.6; color: rgba(255,255,255,0.4); }
    .ramp-card-arrow {
      position: absolute; bottom: 20px; right: 20px; font-size: 18px;
      color: rgba(255,255,255,0.15); transition: color 0.3s, transform 0.3s;
    }

    /* PARTS LIST */
    .parts-list { list-style: none; display: flex; flex-direction: column; }
    .parts-list li {
      display: flex; align-items: flex-start; gap: 16px;
      padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
      cursor: pointer; transition: all 0.2s;

    .parts-list li:first-child { border-top: 1px solid rgba(255,255,255,0.06); }
    .parts-list li:hover .part-name { color: var(--orange); }
    .part-num {

      color: var(--orange); opacity: 0.6; margin-top: 4px; min-width: 24px;

    .part-name {
      font-family: 'Bebas Neue', sans-serif; font-size: 22px;

    }
    .part-desc { font-size: 12px; line-height: 1.6; color: rgba(255,255,255,0.4); margin-top: 3px; }

    /* MERCH */
    .merch-card {
      position: relative; overflow: hidden; cursor: pointer;
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
      transition: all 0.4s;
    }
    .merch-card:hover { border-color: rgba(255,92,0,0.3); }
    .merch-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: var(--orange); color: var(--black);
      font-family: 'Bebas Neue', sans-serif; font-size: 14px;
      letter-spacing: 3px; text-align: center; padding: 12px;
      transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .merch-card:hover .merch-overlay { transform: translateY(0); }

    /* SOCIAL */
    .social-icon {
      width: 48px; height: 48px; border: 1px solid rgba(255,92,0,0.2);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Mono', monospace; font-weight: 700; font-size: 11px;
      color: var(--orange); text-decoration: none; letter-spacing: 1px;
      transition: all 0.3s; cursor: pointer;
    }
    .social-icon:hover { background: var(--orange); color: var(--black); }

    .footer-link {
      color: rgba(255,255,255,0.3); font-size: 10px; text-decoration: none;
      letter-spacing: 2px; transition: color 0.3s; font-weight: 500;
      font-family: 'Space Mono', monospace;

    .footer-link:hover { color: var(--orange); }

    input, textarea, select {
      width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08); color: #f5f2ec; font-size: 14px;
      font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.3s;
    }
    input:focus, textarea:focus, select:focus { border-color: rgba(255,92,0,0.5); }
    select { color: #888; }
    textarea { resize: vertical; }

    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      cursor: pointer; background: none; border: none; padding: 8px; z-index: 1001;
    }
    .hamburger span {
      width: 24px; height: 2px; background: var(--white);
      transition: all 0.3s; display: block;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .fade-up { animation: fadeUp 0.8s ease-out forwards; }

    .stat-num {
      font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px, 7vw, 72px);
      color: var(--orange); line-height: 1;
    }
    .stat-label {
      font-family: 'Space Mono', monospace; font-size: 9px;
      letter-spacing: 3px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-top: 8px;
    }

    /* Noise overlay */
    .noise-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 9999; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    @media (max-width: 768px) {
      .hamburger { display: flex; }
      .desktop-nav { display: none !important; }
      .mobile-menu {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(10,10,10,0.98); z-index: 1000;
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 24px;
      }
      .mobile-menu .nav-link { font-size: 16px; letter-spacing: 5px; }
      .board-grid { grid-template-columns: 1fr !important; }
      .ramps-grid-main { grid-template-columns: 1fr !important; }
    }
  </style>
</head>

  { name: "Trucks", num: "02", desc: "The metal T-shaped axle assembly that connects wheels to the deck." },

const MERCH = [
  { name: "Foundation Ramps Hoodie", color: "#ff5c00", type: "Hoodie", price: "$65" },
  { name: "Blueprint Tee — Black", color: "#1a1a1a", type: "T-Shirt", price: "$35" },

function RampIcon({ type, size = 70 }) {

      {type === "halfpipe" && <g><path d="M10 55 Q10 25 25 25 L55 25 Q70 25 70 55" /><line x1="10" y1="55" x2="10" y2="65" /><line x1="70" y1="55" x2="70" y2="65" /><line x1="10" y1="65" x2="70" y2="65" /><line x1="25" y1="25" x2="55" y2="25" strokeDasharray="3 3" opacity="0.5" /></g>}

      {type === "spine" && <g><path d="M10 55 Q10 30 25 30" /><path d="M70 55 Q70 30 55 30" /><line x1="25" y1="30" x2="55" y2="30" /><line x1="10" y1="55" x2="10" y2="60" /><line x1="70" y1="55" x2="70" y2="60" /></g>}

    </svg>
  );
}

function Counter({ end, duration = 2000, suffix = "" }) {
  const [count, setCount] = useState(0);
  const ref = useRef(null);
  const [started, setStarted] = useState(false);

  useEffect(() => {
    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting && !started) setStarted(true);
    }, { threshold: 0.5 });
    if (ref.current) observer.observe(ref.current);
    return () => observer.disconnect();
  }, [started]);

  useEffect(() => {
    if (!started) return;
    let cur = 0;
    const step = end / (duration / 16);
    const timer = setInterval(() => {
      cur += step;
      if (cur >= end) { setCount(end); clearInterval(timer); }
      else setCount(Math.floor(cur));
    }, 16);
    return () => clearInterval(timer);
  }, [started, end, duration]);

  return <span ref={ref}>{count}{suffix}</span>;
}

        {menuOpen && (

      {/* HERO */}

        <div style={{ maxWidth: 560, zIndex: 1 }}>
          <div className="fade-up" style={{ animationDelay: "0.2s" }}>
            <span style={{
              display: "inline-block", fontFamily: "'Space Mono', monospace",
              fontSize: 10, letterSpacing: 3, textTransform: "uppercase",
              color: "var(--orange)", border: "1px solid var(--orange)",
              padding: "5px 12px", borderRadius: 2, marginBottom: 24,
            }}>★ Custom Built Skateboard Ramps ★</span>
          </div>

          <h1 className="fade-up" style={{
